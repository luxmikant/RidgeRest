name: Auto Update Devlog

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-devlog:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generate devlog entry
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | head -20)

          ENTRY="## ${TIMESTAMP} — ${SHORT_SHA}
          **Author:** ${COMMIT_AUTHOR}
          **Commit:** ${COMMIT_MSG}
          **Changed files:**
          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          ---
          "

          echo "$ENTRY" >> docs/devlog.md

      - name: Commit devlog update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/devlog.md
          git diff --cached --quiet || git commit -m "docs: update devlog [skip ci]"
          git push
